entryPoints:
  web:
    address: ":80"
    http:
      redirections:
        entryPoint:
          to: websecure
          scheme: https
  websecure:
    address: ":443"
    forwardedHeaders:
      insecure: true

providers:
  docker:
    exposedByDefault: false

tls:
  certificates:
    - certFile: /certs/traefik.crt
      keyFile: /certs/traefik.key
  options:
    default:
      minVersion: VersionTLS12

log:
  level: DEBUG
  filePath: /var/log/traefik/traefik.log

api:
  dashboard: true